name: release

# Triggered by pushing a version tag (e.g. v1.0.0). It re-runs the headless
# smoke test and builds a standalone binary for each OS; only if ALL of those
# jobs pass does the final job publish a GitHub Release with the binaries
# attached. A failing test or build blocks the release.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: verify & build (${{ matrix.asset }})
    runs-on: ${{ matrix.os }}
    # Best-effort arches (ARM Linux/Windows) may lack prebuilt pygame wheels.
    # They publish if they build, but a failure does NOT block the release;
    # the four core arches below are required gates.
    continue-on-error: ${{ matrix.experimental == true }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- core arches (required: a failure blocks the release) ---
          - os: ubuntu-latest          # Linux x86_64
            asset: catch-the-falling-items-linux-x86_64
          - os: macos-13               # macOS Intel
            asset: catch-the-falling-items-macos-x86_64
          - os: macos-latest           # macOS Apple Silicon
            asset: catch-the-falling-items-macos-arm64
          - os: windows-latest         # Windows x86_64
            asset: catch-the-falling-items-windows-x86_64
          # --- best-effort arches (published if they build, never block) ---
          - os: ubuntu-24.04-arm       # Linux arm64
            asset: catch-the-falling-items-linux-arm64
            experimental: true
          - os: windows-11-arm         # Windows arm64
            asset: catch-the-falling-items-windows-arm64
            experimental: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Verify (headless smoke test)
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: python smoke_test.py

      - name: Build binary
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            # onedir + windowed produces a proper double-clickable .app bundle
            pyinstaller --windowed --name "${{ matrix.asset }}" main.py
          else
            pyinstaller --onefile --windowed --name "${{ matrix.asset }}" main.py
          fi

      - name: Stage binary
        shell: bash
        run: |
          mkdir -p staging
          if [ "$RUNNER_OS" = "macOS" ]; then
            # zip the .app (a release asset can't be a directory); ditto keeps
            # the bundle's symlinks, Info.plist, and code-signature intact
            ditto -c -k --keepParent "dist/${{ matrix.asset }}.app" "staging/${{ matrix.asset }}.app.zip"
          elif [ -f "dist/${{ matrix.asset }}.exe" ]; then
            cp "dist/${{ matrix.asset }}.exe" "staging/${{ matrix.asset }}.exe"
          else
            cp "dist/${{ matrix.asset }}" "staging/${{ matrix.asset }}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: staging/*
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: artifacts/**/*
          fail_on_unmatched_files: true
